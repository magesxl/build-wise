<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://unpkg.com/tailwindcss@1.9.6/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <style>
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      .thinking-box { background: #f3f4f6; border-left: 3px solid #a5b4fc; border-radius: 6px; margin-bottom: 8px; overflow: hidden; transition: max-height 0.5s ease, margin-bottom 0.5s ease; }
      .thinking-box summary { padding: 6px 12px; font-size: 12px; color: #6366f1; cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 4px; }
      .thinking-box summary::-webkit-details-marker { display: none; }
      .thinking-box summary::before { content: '💭'; font-size: 13px; }
      .thinking-content { padding: 6px 12px 10px 12px; font-size: 12px; color: #6b7280; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; transition: max-height 0.5s ease, padding 0.5s ease, opacity 0.5s ease; opacity: 1; }
      .thinking-box[open] .thinking-content { max-height: 300px; opacity: 1; }
      .thinking-collapsing { opacity: 0 !important; max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; overflow: hidden !important; transition: max-height 0.5s ease, padding 0.5s ease, opacity 0.5s ease !important; }
      .thinking-box-collapsing { max-height: 0 !important; margin-bottom: 0 !important; }
      .history-item { transition: background 0.15s; }
      .history-item:hover { background: #f3f4f6; }
      .history-item.active { background: #eef2ff; border-left: 3px solid #6366f1; }
      /* ── Markdown 分块渲染样式 ── */
      .msg-content { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .msg-content code, .msg-content pre { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 0.9em; }
      .msg-content pre { background: #f3f4f6; border-radius: 4px; padding: 8px 12px; overflow-x: auto; margin: 8px 0; }
      .msg-content code { background: rgba(128,128,128,0.12); padding: 1px 4px; border-radius: 3px; color: #374151; }
      .msg-content pre code { background: none; padding: 0; border-radius: 0; color: inherit; }
      .msg-content table { border-collapse: collapse; width: 100%; margin: 8px 0; overflow-x: auto; display: block; }
      .msg-content th, .msg-content td { border: 1px solid #d1d5db; padding: 6px 10px; text-align: left; font-size: 0.93em; }
      .msg-content th { background: rgba(128,128,128,0.08); font-weight: 600; }
      .msg-content tr:nth-child(even) td { background: rgba(128,128,128,0.02); }
      .msg-content blockquote { border-left: 3px solid #d1d5db; padding-left: 12px; margin: 8px 0; color: #6b7280; }
      .msg-content hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
      .msg-content ul, .msg-content ol { padding-left: 1.5em; margin: 4px 0; }
      .msg-content li { margin: 2px 0; }
      .msg-content h2, .msg-content h3, .msg-content h4 { font-size: 1em; font-weight: 600; margin: 10px 0 4px 0; }
      .msg-content p { margin: 4px 0; }
      .msg-content .md-block { margin-bottom: 6px; }
      .msg-content .md-pending { min-height: 1em; }
      @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .msg-content .md-cursor { display: inline-block; width: 2px; height: 1em; background: #6366f1; margin-left: 1px; vertical-align: text-bottom; animation: cursor-blink 0.8s infinite; }
    </style>
</head>
<body class="h-screen overflow-hidden flex items-center justify-center" style="background: #edf2f7;">
<div class="flex h-screen w-full antialiased text-gray-800">
<div class="flex flex-row h-full w-full overflow-x-hidden">

  <!-- ══════ 侧边栏：历史对话 ══════ -->
  <div class="flex flex-col py-6 pl-4 pr-2 w-56 bg-white flex-shrink-0 border-r border-gray-200">
    <button onclick="newConversation()"
      class="flex items-center justify-center gap-2 w-full mb-4 py-2 rounded-lg border border-indigo-300 text-indigo-600 text-sm font-medium hover:bg-indigo-50 transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      新对话
    </button>
    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">历史对话</div>
    <div id="history-list" class="flex flex-col space-y-0.5 overflow-y-auto flex-1 -mx-1"></div>
    <div class="mt-3 pt-3 border-t border-gray-100">
      <div class="flex items-center gap-2 px-2">
        <div class="h-7 w-7 rounded-full bg-indigo-500 flex items-center justify-center text-white text-xs font-bold">AI</div>
        <div>
          <div class="text-xs font-medium text-gray-700">DeepSeek 分析引擎</div>
          <div class="text-xs text-green-600">● Online</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════ 主区域 ══════ -->
  <div class="flex flex-col flex-auto h-full p-5">
    <div class="flex flex-col flex-auto flex-shrink-0 rounded-2xl bg-gray-100 h-full p-4">
      <!-- 消息区 -->
      <div class="flex flex-col flex-1 overflow-y-auto mb-3" id="scroll-container">
        <div id="chat-messages" class="grid grid-cols-12 gap-y-2"></div>
      </div>
      <!-- 快捷提问 -->
      <div id="quick-buttons" class="flex gap-2 flex-wrap mb-2 px-1">
        <button class="text-xs bg-white hover:bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full transition" onclick="send('请分析工程量信息')">📊 工程量</button>
        <button class="text-xs bg-white hover:bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full transition" onclick="send('当前进度节点是什么？')">📌 进度节点</button>
        <button class="text-xs bg-white hover:bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full transition" onclick="send('请分析成本数据')">💰 成本分析</button>
        <button class="text-xs bg-white hover:bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full transition" onclick="send('模板和脚手架周转情况？')">🏗️ 模板脚手架</button>
      </div>
      <!-- 输入区 -->
      <div class="flex flex-row items-center h-14 rounded-xl bg-white w-full px-4">
        <div class="flex-grow">
          <input id="msg-input" type="text" placeholder="输入问题，或点击下方快捷提问..."
            class="flex w-full border-0 focus:outline-none h-10 text-sm"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"/>
        </div>
        <div class="ml-3">
          <button id="send-btn"
            class="flex items-center justify-center bg-indigo-500 hover:bg-indigo-600 rounded-xl text-white px-5 py-1.5 flex-shrink-0 transition"
            onclick="send()">
            <span id="send-btn-text">发送</span>
            <span class="ml-2">
              <svg class="w-4 h-4 transform rotate-45 -mt-px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
const API = 'http://localhost:3000/api/chat';
const FOLLOWUPS = ['进度是否有异常？', '成本与预算对比如何？', '模板周转情况？', '与上一阶段对比变化如何？'];

marked.setOptions({ breaks: true, gfm: true });

const smdP = import("https://cdn.jsdelivr.net/npm/streaming-markdown@0.2.15/smd.min.js");

const chatMessages = document.getElementById('chat-messages');
const scrollContainer = document.getElementById('scroll-container');
const historyList = document.getElementById('history-list');
const input = document.getElementById('msg-input');
const btn = document.getElementById('send-btn');
const btnText = document.getElementById('send-btn-text');

// ── 对话管理 ──
let conversations = [];
let currentConvId = null;
let messages = [];
let streaming = false;
let abortController = null;

function newConversation() {
  if (streaming) return;
  const id = Date.now().toString(36);
  conversations.unshift({ id, title: '新对话', messages: [] });
  currentConvId = id;
  messages = [];
  chatMessages.innerHTML = '';
  renderHistory();
}

function renderHistory() {
  historyList.innerHTML = conversations.length === 0
    ? '<div class="text-xs text-gray-400 px-2 py-3">暂无历史对话</div>'
    : conversations.map(c => `
      <div class="history-item flex items-center justify-between px-2 py-2 rounded-lg cursor-pointer text-xs ${c.id === currentConvId ? 'active' : ''}"
           onclick="switchConversation('${c.id}')">
        <span class="truncate flex-1 font-medium text-gray-700">${escHtml(c.title)}</span>
        <button class="text-gray-300 hover:text-red-400 ml-1 flex-shrink-0" onclick="event.stopPropagation();deleteConversation('${c.id}')">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>`).join('');
}

function switchConversation(id) {
  if (streaming || id === currentConvId) return;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  currentConvId = id;
  messages = [...conv.messages];
  chatMessages.innerHTML = '';
  for (const m of conv.messages) {
    if (m.role === 'user') {
      const wrap = document.createElement('div');
      wrap.className = 'col-start-6 col-end-13 p-3';
      wrap.innerHTML = `<div class="flex items-center justify-start flex-row-reverse">
        <div class="flex items-center justify-center h-10 w-10 rounded-full bg-green-500 flex-shrink-0 text-white text-xs font-bold">U</div>
        <div class="relative mr-3 text-sm bg-indigo-100 py-2 px-4 shadow rounded-xl">${escHtml(m.content)}</div>
      </div>`;
      chatMessages.appendChild(wrap);
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'col-start-1 col-end-8 p-3';
      wrap.innerHTML = `<div class="flex items-start">
        <div class="flex items-center justify-center h-10 w-10 rounded-full bg-indigo-500 flex-shrink-0 text-white text-xs font-bold">AI</div>
        <div class="relative ml-3 text-sm bg-white py-2 px-4 shadow rounded-xl">${marked.parse(m.content)}</div>
      </div>`;
      chatMessages.appendChild(wrap);
    }
  }
  scroll();
  renderHistory();
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  if (id === currentConvId) {
    currentConvId = conversations.length > 0 ? conversations[0].id : null;
    const conv = conversations.find(c => c.id === currentConvId);
    messages = conv ? [...conv.messages] : [];
    chatMessages.innerHTML = '';
    if (conv) for (const m of conv.messages) {
      if (m.role === 'user') {
        const wrap = document.createElement('div');
        wrap.className = 'col-start-6 col-end-13 p-3';
        wrap.innerHTML = `<div class="flex items-center justify-start flex-row-reverse">
          <div class="flex items-center justify-center h-10 w-10 rounded-full bg-green-500 flex-shrink-0 text-white text-xs font-bold">U</div>
          <div class="relative mr-3 text-sm bg-indigo-100 py-2 px-4 shadow rounded-xl">${escHtml(m.content)}</div>
        </div>`;
        chatMessages.appendChild(wrap);
      } else {
        const wrap = document.createElement('div');
        wrap.className = 'col-start-1 col-end-8 p-3';
        wrap.innerHTML = `<div class="flex items-start">
          <div class="flex items-center justify-center h-10 w-10 rounded-full bg-indigo-500 flex-shrink-0 text-white text-xs font-bold">AI</div>
          <div class="relative ml-3 text-sm bg-white py-2 px-4 shadow rounded-xl">${marked.parse(m.content)}</div>
        </div>`;
        chatMessages.appendChild(wrap);
      }
    }
  }
  renderHistory();
}

function updateConvTitle(text) {
  const conv = conversations.find(c => c.id === currentConvId);
  if (conv && conv.title === '新对话') {
    conv.title = text.length > 20 ? text.slice(0, 20) + '...' : text;
    renderHistory();
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


function scroll() { scrollContainer.scrollTop = scrollContainer.scrollHeight; }

function setButtonStop() {
  btnText.textContent = '⏹ 停止';
  btn.className = 'flex items-center justify-center bg-red-500 hover:bg-red-600 rounded-xl text-white px-5 py-1.5 flex-shrink-0 transition';
  btn.onclick = stop;
}
function setButtonSend() {
  btnText.textContent = '发送';
  btn.className = 'flex items-center justify-center bg-indigo-500 hover:bg-indigo-600 rounded-xl text-white px-5 py-1.5 flex-shrink-0 transition';
  btn.onclick = () => send();
}
function stop() {
  if (abortController) { abortController.abort(); abortController = null; }
  fetch(API.replace('/api/chat', '/api/cancel'), { method: 'POST' }).catch(() => {});
}

async function send(followupText) {
  if (streaming) return;
  const text = followupText || input.value.trim();
  if (!text) return;

  if (!currentConvId) newConversation();
  streaming = true; setButtonStop();
  updateConvTitle(text);

  // ── 用户消息 ──
  const userWrap = document.createElement('div');
  userWrap.className = 'col-start-6 col-end-13 p-3';
  userWrap.innerHTML = `<div class="flex items-center justify-start flex-row-reverse">
    <div class="flex items-center justify-center h-10 w-10 rounded-full bg-green-500 flex-shrink-0 text-white text-xs font-bold">U</div>
    <div class="relative mr-3 text-sm bg-indigo-100 py-2 px-4 shadow rounded-xl">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  </div>`;
  chatMessages.appendChild(userWrap);
  scroll();
  messages.push({ role: 'user', content: text });
  if (!followupText) input.value = '';

  // ── AI 消息：头像 + 内容列（思考区在上，回答气泡在下） ──
  const aiWrap = document.createElement('div');
  aiWrap.className = 'col-start-1 col-end-8 p-3';
  aiWrap.innerHTML = `<div class="flex items-start">
    <div class="flex items-center justify-center h-10 w-10 rounded-full bg-indigo-500 flex-shrink-0 text-white text-xs font-bold">AI</div>
    <div class="ml-3 flex-1 min-w-0 msg-col">
      <div class="thinking-box" style="display:none"><details open><summary>思考过程</summary><div class="thinking-content"></div></details></div>
      <div class="relative text-sm bg-white py-2 px-4 shadow rounded-xl msg-content"></div>
    </div>
  </div>`;
  chatMessages.appendChild(aiWrap);
  const thinkingBox = aiWrap.querySelector('.thinking-box');
  const thinkingContent = aiWrap.querySelector('.thinking-content');
  const aiDiv = aiWrap.querySelector('.msg-content');
  aiDiv.style.display = 'none'; // 思考阶段隐藏回答气泡

  let fullText = '';
  let thinkingText = '';
  let thinkingSeen = false;
  // streaming-markdown 实例
  const smd = await smdP;
  const mdOut = document.createElement('div'); mdOut.className = 'md-output';
  aiDiv.appendChild(mdOut);
  const mkp = smd.parser(smd.default_renderer(mdOut));

  try {
    abortController = new AbortController();
    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model_ids: null, messages }),
      signal: abortController.signal
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'thinking') {
          if (!thinkingSeen) { thinkingSeen = true; thinkingBox.style.display = ''; }
          thinkingText += data.text;
          thinkingContent.textContent = thinkingText;
          thinkingContent.scrollTop = thinkingContent.scrollHeight;
          scroll();
        } else if (data.type === 'thinking_done') {
          if (thinkingSeen) {
            const details = thinkingBox.querySelector('details');
            if (details && details.open) {
              thinkingBox.style.maxHeight = thinkingBox.scrollHeight + 'px';
              thinkingContent.classList.add('thinking-collapsing');
              thinkingBox.offsetHeight;
              thinkingBox.classList.add('thinking-box-collapsing');
              setTimeout(() => {
                details.open = false;
                thinkingContent.classList.remove('thinking-collapsing');
                thinkingBox.classList.remove('thinking-box-collapsing');
                thinkingBox.style.maxHeight = '';
              }, 500);
            }
          }
        } else if (data.type === 'content') {
          if (aiDiv.style.display === 'none') aiDiv.style.display = '';
          fullText += data.text;
          smd.parser_write(mkp, data.text);
          let cur = aiDiv.querySelector('.md-cursor');
          if (!cur) { cur = document.createElement('span'); cur.className = 'md-cursor'; aiDiv.appendChild(cur); }
          else aiDiv.appendChild(cur);
          scroll();
        } else if (data.type === 'done') {
          smd.parser_end(mkp);
          const cur = aiDiv.querySelector('.md-cursor'); if (cur) cur.remove();
          if (FOLLOWUPS.length) {
            const fu = document.createElement('div');
            fu.className = 'mt-2 flex gap-1.5 flex-wrap';
            fu.innerHTML = FOLLOWUPS.map(f =>
              `<button class="bg-gray-100 hover:bg-gray-200 border border-gray-300 text-gray-600 px-3 py-1 rounded-full text-xs" onclick="send('${f.replace(/'/g,"\\'")}')">${f}</button>`
            ).join('');
            aiWrap.appendChild(fu);
          }
          messages.push({ role: 'assistant', content: fullText });
          const conv = conversations.find(c => c.id === currentConvId);
          if (conv) conv.messages = [...messages];
        } else if (data.type === 'error') {
          aiDiv.style.display = '';
          aiDiv.innerHTML = '<div class="text-red-600">' + data.text + '</div>';
        }
      }
    }
  } catch (e) {
    aiDiv.style.display = '';
    if (e.name === 'AbortError') {
      aiDiv.innerHTML = marked.parse(fullText);
    } else {
      aiDiv.innerHTML = '<div class="text-red-600">请求失败: ' + e.message + '（确认服务已启动？）</div>';
    }
  }
  streaming = false; abortController = null; setButtonSend(); input.focus();
}

// ── 初始化 ──
newConversation();
</script>
</body>
</html>
