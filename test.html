<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建造信息 AI 分析</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 'Microsoft YaHei','PingFang SC',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.header{background:#1e293b;padding:14px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:600;color:#f8fafc}
.header .badge{font-size:11px;background:#475569;color:#cbd5e1;padding:3px 8px;border-radius:4px}
.container{max-width:900px;margin:0 auto;padding:20px}
#model-bar{display:flex;gap:8px;margin-bottom:16px}
#model-input{flex:1;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none;background:#fff}
#model-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px #e0e7ff}
#chat-box{background:#fff;border-radius:12px;border:1px solid #e2e8f0;min-height:400px;max-height:560px;overflow-y:auto;padding:20px}
.msg{margin-bottom:16px}
.msg .role{font-size:12px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.msg.user .role{color:#6366f1}
.msg.user .content{background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;padding:12px 16px;color:#3730a3}
.msg.assistant .role{color:#059669}
.msg.assistant .content{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px 20px;color:#1e293b}
.msg.error .role{color:#dc2626}
.msg.error .content{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;color:#991b1b}
/* markdown table */
.msg.assistant .content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.msg.assistant .content th{background:#6366f1;color:#fff;padding:8px 12px;text-align:left;font-weight:600}
.msg.assistant .content td{padding:6px 12px;border-bottom:1px solid #e2e8f0}
.msg.assistant .content tr:nth-child(even) td{background:#f8fafc}
.msg.assistant .content tr:last-child td{font-weight:700;background:#eef2ff;border-top:2px solid #6366f1}
.msg.assistant .content h2,.msg.assistant .content h3{margin:12px 0 6px;color:#1e293b}
.msg.assistant .content code{background:#f1f5f9;padding:2px 6px;border-radius:3px;font-size:13px}
.followups{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.followup-btn{background:#f1f5f9;border:1px solid #cbd5e1;color:#475569;padding:6px 16px;border-radius:20px;font-size:12px;cursor:pointer;transition:.15s}
.followup-btn:hover{background:#e2e8f0;color:#1e293b}
#input-area{display:flex;gap:10px;margin-top:16px}
#msg-input{flex:1;padding:12px 16px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none;resize:none;min-height:44px;font-family:inherit;background:#fff}
#msg-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px #e0e7ff}
button{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-send{background:#6366f1;color:#fff}
.btn-send:hover{background:#4f46e5}
.btn-send:disabled{background:#a5b4fc;cursor:not-allowed}
.btn-stop{background:#dc2626;color:#fff}
.btn-stop:hover{background:#b91c1c}
.status-bar{font-size:12px;color:#94a3b8;padding:8px 0;display:flex;justify-content:space-between}
.cursor{display:inline-block;width:6px;height:14px;background:#6366f1;animation:blink .8s infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div class="header">
  <h1>🏗️ 建造信息 AI 分析</h1>
  <span class="badge">DeepSeek + MongoDB MCP</span>
</div>
<div class="container">
  <div id="model-bar">
    <input id="model-input" type="text" placeholder="模型 GUIDs（逗号分隔）" value="806441689500037,804950977972613">
  </div>
  <div id="chat-box"></div>
  <div class="status-bar"><span id="status-text">就绪</span></div>
  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="输入问题，如：请分析工程量..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="btn-send" id="send-btn" onclick="send()">发送</button>
  </div>
</div>

<script>
const API = 'http://localhost:3000/api/chat';
const FOLLOWUPS = ['进度是否有异常？', '成本与预算对比如何？', '模版周转情况？', '与上一阶段对比变化？'];
const box = document.getElementById('chat-box');
const input = document.getElementById('msg-input');
const btn = document.getElementById('send-btn');
const statusEl = document.getElementById('status-text');

let messages = [];
let streaming = false;
let abortController = null;

// 配置 marked
marked.setOptions({ breaks: true, gfm: true });

function addMsgDiv(role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="role">${{user:'👤 用户',assistant:'🤖 AI 分析',error:'⚠️ 错误'}[role]}</div><div class="content"></div>`;
  box.appendChild(div);
  return div.querySelector('.content');
}

function scroll() { box.scrollTop = box.scrollHeight; }

function setButtonStop() {
  btn.textContent = '⏹ 停止';
  btn.className = 'btn-stop';
  btn.disabled = false;
  btn.onclick = stop;
}

function setButtonSend() {
  btn.textContent = '发送';
  btn.className = 'btn-send';
  btn.disabled = false;
  btn.onclick = () => send();
}

function stop() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
  // 同时通知后端取消
  fetch(API.replace('/api/chat', '/api/cancel'), { method: 'POST' }).catch(() => {});
}

async function send(followupText) {
  if (streaming) return;
  const idsRaw = document.getElementById('model-input').value.trim();
  if (!idsRaw) return alert('请输入模型 GUIDs');
  const modelIds = idsRaw.split(',').map(s => s.trim()).filter(Boolean);
  const text = followupText || input.value.trim();
  if (!text) return;

  streaming = true; setButtonStop(); statusEl.textContent = '分析中...';

  const userDiv = addMsgDiv('user');
  userDiv.textContent = text;
  scroll();
  messages.push({ role: 'user', content: text });
  if (!followupText) input.value = '';

  const aiDiv = addMsgDiv('assistant');
  let fullText = '';

  try {
    abortController = new AbortController();
    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model_ids: modelIds, messages }),
      signal: abortController.signal
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.type === 'content') {
          fullText += data.text;
          aiDiv.innerHTML = marked.parse(fullText) + '<span class="cursor"></span>';
          scroll();
        } else if (data.type === 'done') {
          aiDiv.innerHTML = marked.parse(fullText);
          if (FOLLOWUPS.length) {
            const fu = document.createElement('div');
            fu.className = 'followups';
            fu.innerHTML = FOLLOWUPS.map(f => 
              `<button class="followup-btn" onclick="send('${f.replace(/'/g,"\\'")}')">${f}</button>`
            ).join('');
            aiDiv.parentElement.appendChild(fu);
          }
          messages.push({ role: 'assistant', content: fullText });
        } else if (data.type === 'error') {
          aiDiv.parentElement.className = 'msg error';
          aiDiv.parentElement.querySelector('.role').textContent = '⚠️ 错误';
          aiDiv.innerHTML = data.text;
        }
      }
    }
    statusEl.textContent = '就绪';
  } catch (e) {
    if (e.name === 'AbortError') {
      aiDiv.innerHTML = marked.parse(fullText);
      statusEl.textContent = '已停止';
    } else {
      aiDiv.parentElement.className = 'msg error';
      const roleSpan = aiDiv.parentElement.querySelector('.role');
      if (roleSpan) roleSpan.textContent = '⚠️ 错误';
      aiDiv.innerHTML = `请求失败: ${e.message}（确认服务已启动？cargo run）`;
      statusEl.textContent = '请求失败';
    }
  }
  streaming = false; abortController = null; setButtonSend(); input.focus();
}
</script>
</body>
</html>
