services:
  mongodb:
    image: mongodb/mongodb-community-server:8.0-ubi8-slim
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  app:
    image: build-wise:1.0
    container_name: build-wise
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MDB_MCP_CONNECTION_STRING=mongodb://mongodb:27017/bim_std
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
